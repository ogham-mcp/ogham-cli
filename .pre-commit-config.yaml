repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-build
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
  # Broad-spectrum secret scanner -- parity with the Python MCP config.
  # Catches what detect-private-key misses: postgres/mysql connection strings
  # with passwords, cloud API keys (AWS, GitHub, Anthropic, OpenAI, Supabase
  # sb_secret_, Neon npg_, Stripe sk_), and ~160 other token patterns.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
