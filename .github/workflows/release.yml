name: release

# Fires on any vX.Y.Z tag push. Manual tag → everything else happens here.
# See docs/release-v0.4.md for the full release playbook.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # for creating the GitHub release
  packages: write          # for publishing container images (not used yet)

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests before release
        run: go test ./...

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Default GITHUB_TOKEN publishes the release on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Homebrew tap push is disabled for v0.4.0 (see .goreleaser.yml
          # brews stanza -- commented out). Re-introduce GORELEASER_TAP_TOKEN
          # here when the tap is reactivated in v0.4.1+.
