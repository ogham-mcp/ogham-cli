name: test

# Triggers on every push (any branch) and every pull request. Separate
# from release.yml, which only fires on vX.Y.Z tag pushes. One workflow
# per concern.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

# Opt the JS-based actions (checkout, setup-go) into Node.js 24 ahead of
# the June 2026 default switch. Silences the deprecation warning and
# matches what the runner will use once v24 ships as default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      # The PICT matrix itself (testdata/*.pict.tsv) is committed; tests
       # run against the committed copy. We intentionally do NOT run a
       # regen-drift check in CI: Homebrew PICT and git-source PICT
       # produce different row sets for the same model, which makes
       # byte-identical regen checks impossible without pinning PICT
       # to one build. If a contributor edits a .pict model they are
       # expected to run `make pict-regen` locally and commit the new
       # .tsv; the review diff is the backstop.

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Coverage threshold (internal/native/extraction/)
        # Scoped gate per testing-standards decision 2026-04-20. As each
        # additional internal/native/ package lands its coverage retrofit
        # (task #141), add it to COVER_STRICT_PKGS in the Makefile.
        run: make cover
