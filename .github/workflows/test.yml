name: test

# Triggers on every push (any branch) and every pull request. Separate
# from release.yml, which only fires on vX.Y.Z tag pushes. One workflow
# per concern.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install PICT
        # PICT is Microsoft's pairwise test-case generator. We use it to
        # regenerate testdata/<pkg>.pict.tsv in the regen-check step and
        # fail the build if the committed matrix doesn't match a fresh
        # generation. Not in apt; build from source on Linux (~10s).
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install pict
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq cmake g++
            git clone --depth 1 https://github.com/microsoft/pict.git /tmp/pict-src
            cd /tmp/pict-src && cmake . && make -j"$(nproc)"
            # cmake puts the binary in cli/pict after the build
            sudo install -m 0755 cli/pict /usr/local/bin/pict
            pict --version > /dev/null 2>&1 || true
            echo "pict built at: $(which pict)"
          fi

      - name: Verify PICT matrices are in sync with .pict sources
        # If a maintainer edits a .pict model without regenerating the
        # .tsv, this catches it before the test suite runs against a
        # stale matrix. The committed matrix is canonical-sorted
        # (header preserved, body sorted) so Homebrew PICT and git-
        # source PICT compare equal regardless of internal row order.
        # Must mirror make pict-regen exactly.
        run: |
          for pict_file in internal/native/extraction/testdata/*.pict; do
            [[ -f "$pict_file" ]] || continue
            tsv="${pict_file}.tsv"
            raw=$(mktemp)
            canon=$(mktemp)
            pict "$pict_file" /r:1 > "$raw"
            { head -n 1 "$raw"; tail -n +2 "$raw" | LC_ALL=C sort; } > "$canon"
            if ! diff -q "$tsv" "$canon" > /dev/null; then
              echo "FAIL: $tsv is out of sync with $pict_file"
              diff "$tsv" "$canon" || true
              echo "Run: make pict-regen"
              exit 1
            fi
          done
          echo "all PICT matrices are in sync"

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Coverage threshold (internal/native/extraction/)
        # Scoped gate per testing-standards decision 2026-04-20. As each
        # additional internal/native/ package lands its coverage retrofit
        # (task #141), add it to COVER_STRICT_PKGS in the Makefile.
        run: make cover
