in_markers:
  - in

# --- Recurrence (v0.7) ---
# Explicit recurrence phrases beyond "every <weekday>". Each entry gets
# compiled to a regex and normalised to a canonical category string.
# Matches are case-insensitive and word-boundary anchored. Non-exhaustive
# by design -- the primary recurrence signal is every_words + day_names.
recurrence_patterns:
  - pattern: "daily"
    normalised: "daily"
  - pattern: "weekly"
    normalised: "weekly"
  - pattern: "bi[- ]?weekly"
    normalised: "biweekly"
  - pattern: "fortnightly"
    normalised: "biweekly"
  - pattern: "monthly"
    normalised: "monthly"
  - pattern: "quarterly"
    normalised: "quarterly"
  - pattern: "yearly"
    normalised: "yearly"
  - pattern: "annually"
    normalised: "yearly"

