# --- Date anchors (v0.7) ---
# Arabic relative-date forms: prefix "قبل" ("قبل 3 أيام" = "3 days ago"),
# prefix "منذ" (since-form), prefix "بعد" (after/in). Numbers can be
# written in Western digits (common in tech prose) or Eastern Arabic
# numerals; we match on Western digits only. The parser's regex uses
# \d which matches ASCII 0-9.
#
# NOTE: idiomatic Arabic often uses dual ("يومين" = two days) instead
# of digit + noun when the quantity is 2. We accept the digit-prefixed
# form because it's the dominant style in mixed-script / tech memos.

today_words:
  - "اليوم"

tomorrow_words:
  - "غداً"
  - "غدا"

yesterday_words:
  - "أمس"
  - "امس"

