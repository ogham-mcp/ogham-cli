# French word lists for Ogham MCP extraction and scoring.
# Notes: Month/day names are lowercase in French. All months are masculine.

day_names:
  dimanche: 0
  lundi: 1
  mardi: 2
  mercredi: 3
  jeudi: 4
  vendredi: 5
  samedi: 6

month_names:
