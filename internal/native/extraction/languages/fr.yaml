# "il y a" is the canonical prefix-ago marker in French ("il y a 2 semaines"
# = "2 weeks ago"). parsedatetime maps it the same way.
ago_markers:
  - "il y a"

# "dans" is the canonical prefix-in marker ("dans 3 jours" = "in 3 days").
in_markers:
  - dans

