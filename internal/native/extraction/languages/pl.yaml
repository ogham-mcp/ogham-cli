# --- Date anchors (v0.7) ---
# Polish uses suffix "temu" ("2 tygodnie temu" = "2 weeks ago") and
# prefix "za" ("za 3 dni" = "in 3 days"). Polish nouns decline heavily
# so the unit_* lists include the most common genitive/plural forms.

