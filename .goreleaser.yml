version: 2

builds:
  - main: .
    binary: ogham
    ldflags:
      - -X github.com/ogham-mcp/ogham-cli/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

brews:
  - name: ogham
    repository:
      owner: ogham-mcp
      name: homebrew-tap
    description: "Ogham MCP client -- persistent shared memory for AI agents"
    homepage: "https://ogham-mcp.dev"

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
